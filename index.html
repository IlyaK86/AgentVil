<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vilavi Task Intelligence - Анализ нагрузки директоров</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
        .header { text-align: center; padding: 30px; background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 16px; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; background: linear-gradient(90deg, #3b82f6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #94a3b8; margin-top: 8px; }
        
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: #1e293b; padding: 24px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .kpi-card i { font-size: 2rem; margin-bottom: 10px; }
        .kpi-card:nth-child(1) i { color: #3b82f6; }
        .kpi-card:nth-child(2) i { color: #f59e0b; }
        .kpi-card:nth-child(3) i { color: #10b981; }
        .kpi-card:nth-child(4) i { color: #8b5cf6; }
        .kpi-value { font-size: 2.5rem; font-weight: bold; }
        .kpi-label { color: #94a3b8; margin-top: 5px; }
        
        .directors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .director-card { background: #1e293b; border-radius: 16px; padding: 24px; border: 1px solid #334155; cursor: pointer; transition: all 0.3s; }
        .director-card:hover { border-color: #3b82f6; transform: translateY(-4px); box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        
        .director-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; color: white; flex-shrink: 0; }
        .director-info h3 { font-size: 1.2rem; margin-bottom: 4px; }
        .director-role { color: #94a3b8; font-size: 0.9rem; }
        .workload-badge { background: #3b82f6; padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; margin-left: auto; }
        
        .task-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-item { background: #0f172a; padding: 12px; border-radius: 8px; }
        .stat-label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; }
        .stat-bar { height: 6px; background: #334155; border-radius: 3px; margin-top: 8px; }
        .stat-bar-fill { height: 100%; border-radius: 3px; }
        .stat-bar-fill.executor { background: #3b82f6; }
        .stat-bar-fill.creator { background: #10b981; }
        
        .expand-hint { text-align: center; color: #64748b; font-size: 0.85rem; margin-top: 15px; padding-top: 15px; border-top: 1px solid #334155; }
        
        .task-list { display: none; margin-top: 20px; border-top: 1px solid #334155; padding-top: 20px; }
        .director-card.expanded .task-list { display: block; }
        .director-card.expanded { grid-column: 1 / -1; }
        
        .task-group { margin-bottom: 15px; }
        .task-group-header { display: flex; align-items: center; gap: 10px; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; font-weight: 600; }
        .task-group-header.completed { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .task-group-header.in-progress { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .task-group-header.pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .task-group-count { margin-left: auto; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; font-size: 0.85rem; }
        
        .task-item { background: #0f172a; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .task-id { color: #64748b; font-size: 0.85rem; min-width: 50px; }
        .task-title { flex: 1; min-width: 200px; }
        .task-role { font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; }
        .task-role.executor { background: rgba(59, 130, 246, 0.3); color: #93c5fd; }
        .task-role.creator { background: rgba(16, 185, 129, 0.3); color: #6ee7b7; }
        .task-deadline { color: #64748b; font-size: 0.85rem; }
        
        .filters { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .filters input, .filters select { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 12px 16px; border-radius: 8px; font-size: 1rem; }
        .filters input { flex: 1; min-width: 250px; }
        .filters input:focus, .filters select:focus { outline: none; border-color: #3b82f6; }
        
        @media (max-width: 768px) {
            .kpi-row { grid-template-columns: repeat(2, 1fr); }
            .directors-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-chart-pie"></i> Vilavi Task Intelligence</h1>
            <p>Анализ нагрузки топ-менеджеров</p>
        </header>
        
        <div class="kpi-row">
            <div class="kpi-card">

                <div class="kpi-value" id="kpiDirectors">-</div>

            <div class="kpi-card">

            </div>
            <div class="kpi-card">

                <div class="kpi-value" id="kpiCompleted">-</div>

            <div class="kpi-card">
                <i class="fas fa-spinner"></i>
                <div class="kpi-value" id="kpiInProgress">-</div>
                <div class="kpi-label">В работе</div>
            </div>
        </div>
        
        <div class="filters">
            <input type="text" id="searchInput" placeholder="Поиск по задачам...">
            <select id="statusFilter">
                <option value="all">Все статусы</option>
                <option value="completed">Выполнено</option>
                <option value="inProgress">В работе</option>
                <option value="pending">В ожидании</option>
            </select>
        </div>
        
        <div class="directors-grid" id="directorsGrid"></div>
    </div>

:"264","title":"Согласовать договор РТКЛАУД","status":"5","deadline":"2025-10-29","isExecutor":true},{"id":"272","title":"ИП Слащева - ВИЛАВИ","status":"5","deadline":"","isExecutor":true},{"id":"325","title":"ИВАДЖО - VLV KZ","status":"5","deadline":"2025-11-21","isExecutor":true},{"id":"327","title":"Артлайф-Вилави","status":"5","deadline":"2025-12-12","isExecutor":true},{"id":"379","title":"Росхимия - ВИЛАВИ","status":"5","deadline":"2025-12-03","isExecutor":true},{"id":"395","title":"Проверка текста на возможность публикации","status":"5","deadline":"2025-11-05","isExecutor":true},{"id":"399","title":"(ИМ 2.0) Проверка сайта 2.0","status":"2","deadline":"2026-03-06","isExecutor":true},{"id":"417","title":"Подготовка к Стратегической сессии Vilavi 2.0","status":"2","deadline":"2025-10-30","isExecutor":true},{"id":"501","title":"Армения: необходимость маркировки товаров","status":"5","deadline":"2025-11-11","isExecutor":true},{"id":"529","title":"Подключение google pay и apple pay","status":"5","deadline":"","isExecutor":true},{"id":"533","title":"БЕРНС - ВИЛАВИ","status":"5","deadline":"2025-12-01","isExecutor":true},{"id":"641","title":"МедБазис - ВИЛАВИ","status":"5","deadline":"2025-11-11","isExecutor":true},{"id":"739","title":"ФУДМИ ЛАБ - ВИЛАВИ","status":"5","deadline":"2025-12-02","isExecutor":true},{"id":"969","title":"Поиск альтернативных мер воздействия на селлеров","status":"5","deadline":"2025-12-29","isExecutor":true},{"id":"1067","title":"Армения: допсоглашение на изменение срока оплаты","status":"5","deadline":"2025-11-12","isExecutor":true},{"id":"1081","title":"Договор Борисенко Вилави","status":"2","deadline":"2026-04-30","isExecutor":true},{"id":"1241","title":"Удаление контракта Клиента","status":"5","deadline":"2025-12-12","isExecutor":true},{"id":"1557","title":"регистрация товарных знаков в Казахстане","status":"3","deadline":"2026-08-28","isExecutor":true},{"id":"1563","title":"Продление регистрации товарных знаков","status":"5","deadline"         function getInitials(name) { return name.split(' ').map(n => n[0]).join('').substring(0, 2); }
        
        function getTaskGroups(tasks, searchTerm, statusFilter) {
            let filtered = tasks.filter(t => {
                const matchSearch = !searchTerm || t.title.toLowerCase().includes(searchTerm.toLowerCase());
                let matchStatus = true;
                if (statusFilter === 'completed') matchStatus = t.status === '5' || t.status === '6';
                else if (statusFilter === 'inProgress') matchStatus = t.status === '3' || t.status === '4';
                else if (statusFilter === 'pending') matchStatus = t.status === '1' || t.status === '2';
                return matchSearch && matchStatus;
            });
            return {
                completed: filtered.filter(t => t.status === '5' || t.status === '6'),
                inProgress: filtered.filter(t => t.status === '3' || t.status === '4'),
                pending: filtered.filter(t => t.status === '1' || t.status === '2')
            };
        }
        
        function renderTaskGroup(title, tasks, className) {
            if (!tasks.length) return '';
            return '<div class="task-group"><div class="task-group-header ' + className + '"><i class="fas fa-' + (className === 'completed' ? 'check-circle' : className === 'in-progress' ? 'spinner' : 'clock') + '"></i>' + title + '<span class="task-group-count">' + tasks.length + '</span></div>' + tasks.map(t => '<div class="task-item"><span class="task-id">#' + t.id + '</span><span class="task-title">' + t.title + '</span><span class="task-role ' + (t.isExecutor ? 'executor' : 'creator') + '"><i class="fas fa-' + (t.isExecutor ? 'hand-pointer' : 'plus') + '"></i>' + (t.isExecutor ? 'Исп.' : 'Созд.') + '</span>' + (t.deadline ? '<span class="task-deadline"><i class="far fa-calendar"></i> ' + t.deadline + '</span>' : '') + '</div>').join('') + '</div>';
        }
        
        function renderDirectorCard(id, director) {
            const info = directorNames[id] || { name: director.name, role: director.role, color: '#6b7280' };
            const searchTerm = document.getElementById('searchInput').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const groups = getTaskGroups(director.tasks, searchTerm, statusFilter);
            const maxWorkload = 35;
            return '<div class="director-card" onclick="this.classList.toggle(\'expanded\')"><div class="director-header"><div class="avatar" style="background:' + info.color + '">' + getInitials(info.name) + '</div><div class="director-info"><h3>' + info.name + '</h3><div class="director-role">' + info.role + '</div></div><div class="workload-badge">' + director.totalWorkload + ' задач</div></div><div class="task-stats"><div class="stat-item"><div class="stat-label"><i class="fas fa-hand-pointer"></i> Как исполнитель</div><div class="stat-value">' + director.asExecutor.total + '</div><div class="stat-bar"><div class="stat-bar-fill executor" style="width:' + Math.min((director.asExecutor.total/maxWorkload)*100,100) + '%"></div></div></div><div class="stat-item"><div class="stat-label"><i class="fas fa-plus"></i> Как создатель</div><div class="stat-value">' + director.asCreator.total + '</div><div class="stat-bar"><div class="stat-bar-fill creator" style="width:' + Math.min((director.asCreator.total/maxWorkload)*100,100) + '%"></div></div></div></div><div class="expand-hint"><i class="fas fa-chevron-down"></i> Нажмите для деталей</div><div class="task-list">' + (director.tasks.length ? renderTaskGroup('Выполнено', groups.completed, 'completed') + renderTaskGroup('В работе', groups.inProgress, 'in-progress') + renderTaskGroup('В ожидании', groups.pending, 'pending') : '<div style="text-align:center;color:#64748b;padding:20px;">Нет задач</div>') + '</div></div>';
        }
        
        function renderDashboard() {
            const directors = Object.entries(embeddedData.directors).sort((a,b) => b[1].totalWorkload - a[1].totalWorkload);
            document.getElementById('directorsGrid').innerHTML = directors.map(([id, d]) => renderDirectorCard(id, d)).join('');
            let totalTasks = 0, completed = 0, inProgress = 0;
            Object.values(embeddedData.directors).forEach(d => { d.tasks.forEach(t => { totalTasks++; if (t.status === '5' || t.status === '6') completed++; else if (t.status === '3' || t.status === '4') inProgress++; }); });
            document.getElementById('kpiDirectors').textContent = directors.length;
            document.getElementById('kpiTasks').textContent = totalTasks;
            document.getElementById('kpiCompleted').textContent = completed;
            document.getElementById('kpiInProgress').textContent = inProgress;
        }
        
        document.getElementById('searchInput').addEventListener('input', renderDashboard);
        document.getElementById('statusFilter').addEventListener('change', renderDashboard);
        renderDashboard();
    </script>
</body>
</html>
