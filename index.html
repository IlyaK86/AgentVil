<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vilavi Task Intelligence Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e7;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-info {
            text-align: right;
            font-size: 14px;
            color: #a1a1aa;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        
        .stat-card .label {
            font-size: 13px;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .stat-card .value {
            font-size: 36px;
            font-weight: 700;
        }
        
        .stat-card .value.warning { color: #fbbf24; }
        .stat-card .value.danger { color: #ef4444; }
        .stat-card .value.success { color: #34d399; }
        .stat-card .value.info { color: #60a5fa; }
        
        .stat-card .change {
            font-size: 12px;
            margin-top: 8px;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        @media (max-width: 1200px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card h2 .icon {
            font-size: 24px;
        }
        
        .user-row {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            transition: background 0.2s;
        }
        
        .user-row:hover {
            background: rgba(255,255,255,0.08);
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            margin-right: 12px;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .user-stats {
            font-size: 12px;
            color: #a1a1aa;
        }
        
        .user-metrics {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        
        .metric {
            text-align: center;
        }
        
        .metric .value {
            font-size: 18px;
            font-weight: 600;
        }
        
        .metric .label {
            font-size: 10px;
            color: #71717a;
            text-transform: uppercase;
        }
        
        .progress-bar {
            width: 100px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-bar .fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        .task-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .task-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .task-list::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .task-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }
        
        .task-item {
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            border-left: 3px solid #60a5fa;
            transition: background 0.2s;
        }
        
        .task-item:hover {
            background: rgba(255,255,255,0.08);
        }
        
        .task-item.warning {
            border-left-color: #fbbf24;
        }
        
        .task-item.danger {
            border-left-color: #ef4444;
        }
        
        .task-item .task-title {
            font-weight: 500;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .task-item .task-id {
            font-size: 11px;
            color: #71717a;
            font-family: monospace;
        }
        
        .task-item .task-meta {
            font-size: 12px;
            color: #a1a1aa;
            display: flex;
            gap: 16px;
        }
        
        .task-item .task-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .tab:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .tab.active {
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            border-color: transparent;
        }
        
        .tab .count {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 8px;
        }
        
        .status-chart {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .status-item {
            flex: 1;
            min-width: 100px;
            text-align: center;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }
        
        .status-item .status-name {
            font-size: 12px;
            color: #a1a1aa;
            margin-bottom: 8px;
        }
        
        .status-item .status-value {
            font-size: 28px;
            font-weight: 700;
        }
        
        .status-item .status-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .status-item .status-bar .fill {
            height: 100%;
            border-radius: 2px;
        }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge.warning { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .badge.danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .badge.info { background: rgba(96, 165, 250, 0.2); color: #60a5fa; }
        .badge.success { background: rgba(52, 211, 153, 0.2); color: #34d399; }
        
        .btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(96, 165, 250, 0.4);
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #a1a1aa;
        }
        
        .loading::before {
            content: '';
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #71717a;
        }
        
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .refresh-info {
            font-size: 12px;
            color: #71717a;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>📊 Vilavi Task Intelligence</h1>
                <div class="refresh-info" id="refreshInfo">Загрузка данных...</div>
            </div>
            <button class="btn" onclick="refreshData()">🔄 Обновить</button>
        </header>
        
        <div class="stats-grid" id="statsGrid">
            <div class="loading">Загрузка статистики...</div>
        </div>
        
        <div class="status-chart" id="statusChart"></div>
        
        <div class="grid-2">
            <div class="card">
                <h2><span class="icon">👤</span> Задачи Картунова</h2>
                <div id="kartunovTasks">
                    <div class="loading">Загрузка...</div>
                </div>
            </div>
            
            <div class="card">
                <h2><span class="icon">👥</span> Все исполнители</h2>
                <div id="usersList">
                    <div class="loading">Загрузка...</div>
                </div>
            </div>
            
            <div class="card">
                <h2><span class="icon">⚠️</span> Проблемные задачи</h2>
                <div class="tabs" id="problemTabs">
                    <div class="tab active" onclick="showProblems('dead')">⚠️ Без движения<span class="count" id="deadCount">0</span></div>
                    <div class="tab" onclick="showProblems('overdue')">🟥 Просроченные<span class="count" id="overdueCount">0</span></div>
                    <div class="tab" onclick="showProblems('no_deadline')">⏰ Без срока<span class="count" id="noDeadlineCount">0</span></div>
                    <div class="tab" onclick="showProblems('long')">🐌 Долгие<span class="count" id="longCount">0</span></div>
                </div>
                <div class="task-list" id="problemsList">
                    <div class="loading">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let data = null;
        let currentProblemTab = 'dead';
        
        async function loadData() {
            try {
                const response = await fetch('data/tasks.json');
                data = await response.json();
                renderDashboard();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('statsGrid').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>Не удалось загрузить данные</p>
                        <p style="font-size: 12px; margin-top: 8px;">Проверьте, что скрипт сбора данных запущен</p>
                    </div>
                `;
            }
        }
        
        function renderDashboard() {
            if (!data) return;
            
            const summary = data.summary;
            const meta = {generated_at: summary.fetched_at};
            
            document.getElementById('refreshInfo').textContent = 
                `Обновлено: ${new Date(summary.fetched_at).toLocaleString('ru-RU')}`;
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="label">Всего задач</div>
                    <div class="value info">${summary.total}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Просроченные</div>
                    <div class="value danger">${summary.overdue}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Без движения</div>
                    <div class="value warning">${data.dead_tasks.length}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Без срока (>30д)</div>
                    <div class="value warning">${data.no_deadline.length}</div>
                </div>
            `;
            
            renderStatusChart(summary);
            renderKartunovTasks();
            renderUsers(summary);
            renderProblemCounts();
            showProblems('dead');
        }
        
        function renderKartunovTasks() {
            const kartunovId = '427';
            const kartunovTasks = data.all_tasks.filter(t => 
                t.responsible_id === kartunovId || t.created_by === kartunovId
            );
            
            const responsible = kartunovTasks.filter(t => t.responsible_id === kartunovId);
            const created = kartunovTasks.filter(t => t.created_by === kartunovId && t.responsible_id !== kartunovId);
            
            let html = `<div style="margin-bottom: 16px; font-size: 13px; color: #a1a1aa;">
                📋 На исполнении: <strong>${responsible.length}</strong> | 
                📁 Созданных: <strong>${created.length}</strong>
            </div>`;
            
            if (responsible.length === 0) {
                html += '<div class="empty-state"><div class="icon">✅</div><p>Нет задач на исполнении</p></div>';
            } else {
                html += '<div class="task-list">';
                for (const task of responsible) {
                    const statusClass = task.classification && task.classification.includes('overdue') ? 'danger' : 
                                       task.classification && task.classification.includes('dead') ? 'warning' : '';
                    const days = task.days_without_movement || 0;
                    html += `
                        <div class="task-item ${statusClass}">
                            <div class="task-title">
                                <span>${task.title}</span>
                                <span class="task-id">#${task.id}</span>
                            </div>
                            <div class="task-meta">
                                <span>📅 ${days} ${getDaysWord(days)} без движения</span>
                                ${task.deadline ? `<span>⏰ до ${formatDate(task.deadline)}</span>` : ''}
                            </div>
                        </div>
                    `;
                }
                html += '</div>';
            }
            
            document.getElementById('kartunovTasks').innerHTML = html;
        }
        
        function renderStatusChart(summary) {
            const total = summary.total || 1;
            const colors = {
                'Новая': '#818cf8',
                'Ожидает': '#fbbf24',
                'В работе': '#60a5fa',
                'На проверке': '#a78bfa',
                'Завершена': '#34d399',
                'Отложена': '#71717a'
            };
            
            let html = '';
            for (const [status, count] of Object.entries(summary.by_status)) {
                const pct = Math.round((count / total) * 100);
                const color = colors[status] || '#60a5fa';
                html += `
                    <div class="status-item">
                        <div class="status-name">${status}</div>
                        <div class="status-value">${count}</div>
                        <div class="status-bar">
                            <div class="fill" style="width: ${pct}%; background: ${color};"></div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('statusChart').innerHTML = html;
        }
        
        function renderUsers(summary) {
            const sortedUsers = Object.entries(summary.by_user)
                .sort((a, b) => (b[1].dead + b[1].overdue) - (a[1].dead + a[1].overdue));
            
            let html = '';
            for (const [uid, user] of sortedUsers) {
                const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
                const healthColor = user.dead_rate > 30 ? '#ef4444' : user.dead_rate > 10 ? '#fbbf24' : '#34d399';
                
                html += `
                    <div class="user-row">
                        <div class="user-avatar">${initials}</div>
                        <div class="user-info">
                            <div class="user-name">${user.name}</div>
                            <div class="user-stats">${user.count} задач</div>
                        </div>
                        <div class="user-metrics">
                            <div class="metric">
                                <div class="value" style="color: #fbbf24;">${user.dead}</div>
                                <div class="label">Без движения</div>
                            </div>
                            <div class="metric">
                                <div class="value" style="color: #ef4444;">${user.overdue}</div>
                                <div class="label">Просрочено</div>
                            </div>
                            <div class="progress-bar">
                                <div class="fill" style="width: ${user.dead_rate}%; background: ${healthColor};"></div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            if (!html) {
                html = '<div class="empty-state"><div class="icon">👥</div><p>Нет данных о пользователях</p></div>';
            }
            
            document.getElementById('usersList').innerHTML = html;
        }
        
        function renderProblemCounts() {
            document.getElementById('deadCount').textContent = data.dead_tasks.length;
            document.getElementById('overdueCount').textContent = data.all_tasks.filter(t => 
                t.classification && t.classification.includes('overdue')
            ).length;
            document.getElementById('noDeadlineCount').textContent = data.no_deadline.length;
            document.getElementById('longCount').textContent = data.extremely_long.length;
        }
        
        function showProblems(type) {
            currentProblemTab = type;
            
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.closest('.tab').classList.add('active');
            
            let tasks = [];
            switch(type) {
                case 'dead':
                    tasks = data.dead_tasks;
                    break;
                case 'overdue':
                    tasks = data.all_tasks.filter(t => t.classification && t.classification.includes('overdue'));
                    break;
                case 'no_deadline':
                    tasks = data.no_deadline;
                    break;
                case 'long':
                    tasks = data.extremely_long;
                    break;
            }
            
            let html = '';
            for (const task of tasks.slice(0, 50)) {
                const itemClass = type === 'dead' ? 'warning' : type === 'overdue' ? 'danger' : '';
                const days = task.days_without_movement || task.days_old || task.planned_duration || 0;
                
                html += `
                    <div class="task-item ${itemClass}">
                        <div class="task-title">
                            <span>${task.title}</span>
                            <span class="task-id">#${task.id}</span>
                        </div>
                        <div class="task-meta">
                            <span>👤 ${task.responsible_name}</span>
                            <span>📅 ${days} ${getDaysWord(days)}</span>
                            ${task.deadline ? `<span>⏰ ${formatDate(task.deadline)}</span>` : ''}
                        </div>
                    </div>
                `;
            }
            
            if (!html) {
                html = '<div class="empty-state"><div class="icon">✅</div><p>Нет задач в этой категории</p></div>';
            }
            
            document.getElementById('problemsList').innerHTML = html;
        }
        
        function getDaysWord(n) {
            if (n % 10 === 1 && n % 100 !== 11) return 'день';
            if (n % 10 >= 2 && n % 10 <= 4 && (n % 100 < 10 || n % 100 >= 20)) return 'дня';
            return 'дней';
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('ru-RU', {day: 'numeric', month: 'short'});
        }
        
        async function refreshData() {
            document.getElementById('statsGrid').innerHTML = '<div class="loading">Обновление...</div>';
            
            try {
                const response = await fetch('/api/collect', {method: 'POST'});
                if (response.ok) {
                    await loadData();
                } else {
                    alert('Ошибка обновления данных. Запустите скрипт сбора данных.');
                }
            } catch (error) {
                console.error('Refresh error:', error);
                alert('Ошибка обновления. Проверьте консоль.');
            }
        }
        
        loadData();
        
        setInterval(() => {
            loadData();
        }, 300000);
    </script>
</body>
</html>
