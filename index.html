<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vilavi Task Intelligence - Анализ нагрузки</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0f0f14;
            --bg-secondary: #1a1a24;
            --bg-card: #22222e;
            --bg-card-hover: #2a2a38;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --border-color: #333344;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 24px 0;
            margin-bottom: 30px;
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .logo-text h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo-text p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box input {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 16px 10px 40px;
            color: var(--text-primary);
            font-size: 14px;
            width: 250px;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
        
        .status-filter {
            display: flex;
            gap: 8px;
        }
        
        .status-filter button {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .status-filter button:hover,
        .status-filter button.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }
        
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s;
        }
        
        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        
        .kpi-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .kpi-icon.blue { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }
        .kpi-icon.green { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
        .kpi-icon.orange { background: rgba(245, 158, 11, 0.2); color: var(--accent-orange); }
        .kpi-icon.purple { background: rgba(139, 92, 246, 0.2); color: var(--accent-purple); }
        
        .kpi-info h3 {
            font-size: 28px;
            font-weight: 700;
        }
        
        .kpi-info p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .directors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .director-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .director-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }
        
        .director-card.expanded {
            grid-column: 1 / -1;
        }
        
        .director-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: white;
        }
        
        .director-info h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .director-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .director-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .stat-item {
            flex: 1;
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }
        
        .stat-item h4 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .stat-item p {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .expand-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        
        .task-list {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            display: none;
        }
        
        .director-card.expanded .task-list {
            display: block;
        }
        
        .director-card.expanded .expand-hint {
            display: none;
        }
        
        .task-group {
            margin-bottom: 20px;
        }
        
        .task-group h4 {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 3px solid var(--accent-blue);
        }
        
        .task-item {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }
        
        .task-item:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        
        .task-id {
            background: var(--bg-card);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-blue);
            min-width: 50px;
            text-align: center;
        }
        
        .task-title {
            flex: 1;
            font-size: 14px;
        }
        
        .task-meta {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .task-role {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 6px;
        }
        
        .task-role.executor {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
        }
        
        .task-role.creator {
            background: rgba(139, 92, 246, 0.2);
            color: var(--accent-purple);
        }
        
        .task-status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 6px;
            min-width: 90px;
            text-align: center;
        }
        
        .task-status.completed { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
        .task-status.in-progress { background: rgba(245, 158, 11, 0.2); color: var(--accent-orange); }
        .task-status.pending { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
        .task-status.closed { background: rgba(139, 92, 246, 0.2); color: var(--accent-purple); }
        
        .task-deadline {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 140px;
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }
        
        @media (max-width: 768px) {
            .kpi-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .directors-grid {
                grid-template-columns: 1fr;
            }
            .filters {
                width: 100%;
            }
            .search-box input {
                width: 100%;
            }
            .task-item {
                flex-wrap: wrap;
            }
            .task-meta {
                width: 100%;
                margin-top: 8px;
            }
        }
    </style>
</head>

        let currentStatusFilter = 'all';
        let currentSearchQuery = '';
        
        const avatarColors = {
            '1': 'linear-gradient(135deg, #3b82f6, #1d4ed8)',
            '12': 'linear-gradient(135deg, #ec4899, #be185d)',
            '16': 'linear-gradient(135deg, #f59e0b, #d97706)',
            '18': 'linear-gradient(135deg, #10b981, #059669)',
            '26': 'linear-gradient(135deg, #8b5cf6, #7c3aed)',
            '30': 'linear-gradient(135deg, #ef4444, #dc2626)',
            '427': 'linear-gradient(135deg, #06b6d4, #0891b2)'
        };
        
        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').substring(0, 2);
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '—';
            const date = new Date(dateStr);
            return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
        }
        
        function getStatusCategory(statusText) {
            if (statusText === 'Выполнено' || statusText === 'Завершено') return 'completed';
            if (statusText === 'В работе') return 'in-progress';
            if (statusText === 'В ожидании') return 'pending';
            return 'other';
        }
        
        function calculateKPIs() {
            let totalTasks = 0;
            let completed = 0;
            let inProgress = 0;
            
            Object.values(embeddedData.directors).forEach(director => {
                director.tasks.forEach(task => {
                    totalTasks++;
                    if (task.status === '5' || task.status === '6') completed++;
                    else if (task.status === '3') inProgress++;
                });
            });
            
            document.getElementById('totalTasks').textContent = totalTasks;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('inProgressTasks').textContent = inProgress;
        }
        
        function renderDirectors() {
            const grid = document.getElementById('directorsGrid');
            grid.innerHTML = '';
            
            const directorIds = ['1', '12', '16', '18', '26', '30', '427'];
            let hasResults = false;
            
            directorIds.forEach(id => {
                const director = embeddedData.directors[id];
                if (!director) return;
                
                const filteredTasks = director.tasks.filter(task => {
                    const matchesStatus = currentStatusFilter === 'all' || 
                        getStatusCategory(task.statusText) === currentStatusFilter;
                    const matchesSearch = currentSearchQuery === '' || 
                        task.title.toLowerCase().includes(currentSearchQuery.toLowerCase()) ||
                        task.id.includes(currentSearchQuery);
                    return matchesStatus && matchesSearch;
                });
                
                if (filteredTasks.length > 0 || currentStatusFilter === 'all') {
                    hasResults = true;
                }
                
                const card = document.createElement('div');
                card.className = 'director-card';
                card.dataset.directorId = id;
                card.onclick = (e) => {
                    if (e.target.closest('.task-item')) return;
                    card.classList.toggle('expanded');
                };
                
                const tasksByStatus = {
                    completed: filteredTasks.filter(t => t.status === '5' || t.status === '6'),
                    inProgress: filteredTasks.filter(t => t.status === '3'),
                    pending: filteredTasks.filter(t => t.status === '2')
                };
                
                let tasksHtml = '';
                
                if (tasksByStatus.completed.length > 0) {
                    tasksHtml += `<div class="task-group"><h4>Выполнено (${tasksByStatus.completed.length})</h4>`;
                    tasksByStatus.completed.forEach(task => {
                        tasksHtml += renderTaskItem(task);
                    });
                    tasksHtml += '</div>';
                }
                
                if (tasksByStatus.inProgress.length > 0) {
                    tasksHtml += `<div class="task-group"><h4>В работе (${tasksByStatus.inProgress.length})</h4>`;
                    tasksByStatus.inProgress.forEach(task => {
                        tasksHtml += renderTaskItem(task);
                    });
                    tasksHtml += '</div>';
                }
                
                if (tasksByStatus.pending.length > 0) {
                    tasksHtml += `<div class="task-group"><h4>В ожидании (${tasksByStatus.pending.length})</h4>`;
                    tasksByStatus.pending.forEach(task => {
                        tasksHtml += renderTaskItem(task);
                    });
                    tasksHtml += '</div>';
                }
                
                if (filteredTasks.length === 0) {
                    tasksHtml = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">Нет задач по выбранным фильтрам</p>';
                }
                
                card.innerHTML = `
                    <div class="director-header">
                        <div class="avatar" style="background: ${avatarColors[id] || 'linear-gradient(135deg, #6366f1, #4f46e5)'}">
                            ${getInitials(director.name)}
                        </div>
                        <div class="director-info">
                            <h3>${director.name}</h3>
                            <p>${director.role}</p>
                        </div>
                    </div>
                    <div class="director-stats">
                        <div class="stat-item">
                            <h4>${director.asExecutor.total}</h4>
                            <p>Как исполнитель</p>
                        </div>
                        <div class="stat-item">
                            <h4>${director.asCreator.total}</h4>
                            <p>Как создатель</p>
                        </div>
                        <div class="stat-item">
                            <h4>${director.totalWorkload}</h4>
                            <p>Всего</p>
                        </div>
                    </div>
                    <div class="task-list">${tasksHtml}</div>
                    <div class="expand-hint">
                        <i class="fas fa-chevron-down"></i>
                        <span>Нажмите для деталей</span>
                    </div>
                `;
                
                grid.appendChild(card);
            });
            
            if (!hasResults && currentSearchQuery) {
                grid.innerHTML = '<div class="no-results">Задачи не найдены</div>';
            }
        }
        
        function renderTaskItem(task) {
            const statusClass = getStatusCategory(task.statusText);
            const roleClass = task.isExecutor ? 'executor' : 'creator';
            const roleText = task.isExecutor ? 'Исполнитель' : 'Создатель';
            
            return `
                <div class="task-item">
                    <span class="task-id">#${task.id}</span>
                    <span class="task-title">${task.title}</span>
                    <div class="task-meta">
                        <span class="task-role ${roleClass}">${roleText}</span>
                        <span class="task-status ${statusClass}">${task.statusText}</span>
                        <span class="task-deadline"><i class="fas fa-calendar-alt"></i> ${formatDate(task.deadline)}</span>
                    </div>
                </div>
            `;
        }
        
        function setStatusFilter(status) {
            currentStatusFilter = status;
            document.querySelectorAll('.status-filter button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.status === status);
            });
            renderDirectors();
        }
        
        function filterTasks() {
            currentSearchQuery = document.getElementById('searchInput').value;
            renderDirectors();
        }
        
        calculateKPIs();
        renderDirectors();
    </script>
