        .search-box { max-width: 600px; margin: 0 auto 20px; }

        .hero-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; max-width: 1200px; margin: 0 auto 24px; }
        .hero-card { background: #fff; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .hero-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        .hero-card .name { font-weight: 600; font-size: 14px; margin-bottom: 4px; color: #333; }
        .hero-card .dept { font-size: 12px; color: #666; margin-bottom: 8px; }
        .hero-card .count { font-size: 28px; font-weight: 700; color: #0066cc; }
        .hero-card .count-label { font-size: 11px; color: #999; }
        
        .detail-section { max-width: 1200px; margin: 0 auto; }
        
        .director-card { background: #fff; border-radius: 12px; margin-bottom: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        
        .director-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
        .director-header:hover { background: #f9f9f9; }
        .director-header .title { display: flex; align-items: center; gap: 12px; }
        .director-header h3 { font-size: 16px; color: #1a1a1a; }
        .director-header .badge { background: #e8f0fe; color: #1a73e8; padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: 500; }
        .director-header .arrow { transition: transform 0.3s; color: #666; }
        .director-card.expanded .arrow { transform: rotate(180deg); }
        
        .director-content { display: none; padding: 0 20px 20px; }
        .director-card.expanded .director-content { display: block; }
        
        .status-group { margin-bottom: 16px; }
        .status-group h4 { font-size: 13px; color: #666; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 2px solid; display: flex; justify-content: space-between; align-items: center; }
        .status-group h4 .count { font-weight: 600; }
        
        .status-completed h4 { border-color: #34a853; color: #34a853; }
        .status-inwork h4 { border-color: #fbbc04; color: #fbbc04; }
        .status-pending h4 { border-color: #ea4335; color: #ea4335; }
        
        .task-list { list-style: none; }
        .task-item { padding: 10px 12px; margin-bottom: 6px; background: #fafafa; border-radius: 6px; display: flex; align-items: flex-start; gap: 10px; }
        .task-item:hover { background: #f0f0f0; }
        .task-item .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
        .task-item.completed .status-dot { background: #34a853; }
        .task-item.inwork .status-dot { background: #fbbc04; }
        .task-item.pending .status-dot { background: #ea4335; }
        .task-item .task-title { font-size: 13px; color: #333; flex: 1; word-break: break-word; }
        .task-item .task-id { font-size: 11px; color: #999; flex-shrink: 0; }
        
        .hidden { display: none !important; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .director-card.expanded { animation: fadeIn 0.3s ease; }

    function getStatusClass(status) {
        if (status === "5" || status === "6") return "completed";
        if (status === "3") return "inwork";
        return "pending";
    }
    
    function countByStatus(tasks, status) {
        return tasks.filter(t => t.status === status).length;
    }
    
    function renderHeroCards() {
        const grid = document.getElementById('heroGrid');
        grid.innerHTML = '';
        
        Object.keys(data).forEach(dept => {
            const d = data[dept];
            const card = document.createElement('div');
            card.className = 'hero-card';
            card.onclick = () => scrollToDirector(dept);
            card.innerHTML = `
                <div class="name">${d.director}</div>
                <div class="dept">${deptNames[dept]}</div>
                <div class="count">${d.tasks.length}</div>
                <div class="count-label">задач</div>
            `;
            grid.appendChild(card);
        });
    }
    
    function scrollToDirector(dept) {
        const el = document.getElementById('director-' + dept);
        if (el) {
            el.scrollIntoView({ behavior: 'smooth' });
            el.classList.add('expanded');
        }
    }
    
    function renderDetailCards() {
        const section = document.getElementById('detailSection');
        section.innerHTML = '';
        
        Object.keys(data).forEach(dept => {
            const d = data[dept];
            const tasks = d.tasks;
            
            const completed = tasks.filter(t => t.status === "5" || t.status === "6");
            const inwork = tasks.filter(t => t.status === "3");
            const pending = tasks.filter(t => t.status === "2");
            
            const card = document.createElement('div');
            card.className = 'director-card';
            card.id = 'director-' + dept;
            
            let tasksHtml = '';
            
            if (completed.length) {
                tasksHtml += `
                    <div class="status-group status-completed">
                        <h4>Завершённые <span class="count">${completed.length}</span></h4>
                        <ul class="task-list">
                            ${completed.map(t => `
                                <li class="task-item completed" data-search="${t.title.toLowerCase()}">
                                    <span class="status-dot"></span>
                                    <span class="task-title">${t.title}</span>
                                    <span class="task-id">#${t.id}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }
            
            if (inwork.length) {
                tasksHtml += `
                    <div class="status-group status-inwork">
                        <h4>В работе <span class="count">${inwork.length}</span></h4>
                        <ul class="task-list">
                            ${inwork.map(t => `
                                <li class="task-item inwork" data-search="${t.title.toLowerCase()}">
                                    <span class="status-dot"></span>
                                    <span class="task-title">${t.title}</span>
                                    <span class="task-id">#${t.id}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }
            
            if (pending.length) {
                tasksHtml += `
                    <div class="status-group status-pending">
                        <h4>Ожидающие <span class="count">${pending.length}</span></h4>
                        <ul class="task-list">
                            ${pending.map(t => `
                                <li class="task-item pending" data-search="${t.title.toLowerCase()}">
                                    <span class="status-dot"></span>
                                    <span class="task-title">${t.title}</span>
                                    <span class="task-id">#${t.id}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }
            
            card.innerHTML = `
                <div class="director-header" onclick="toggleCard(this)">
                    <div class="title">
                        <h3>${d.director} | ${deptNames[dept]}</h3>
                        <span class="badge">${tasks.length} задач</span>
                    </div>
                    <span class="arrow">▼</span>
                </div>
                <div class="director-content">
                    ${tasksHtml}
                </div>
            `;
            
            section.appendChild(card);
        });
    }
    
    function toggleCard(header) {
        const card = header.closest('.director-card');
        card.classList.toggle('expanded');
    }
    
    function setupSearch() {
        const input = document.getElementById('searchInput');
        input.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.director-card').forEach(card => {
                const items = card.querySelectorAll('.task-item');
                let hasMatch = false;
                items.forEach(item => {
                    const text = item.getAttribute('data-search');
                    if (query && text.includes(query)) {
                        item.classList.remove('hidden');
                        hasMatch = true;
                    } else {
                        item.classList.add('hidden');
                    }
                });
                if (query) {
                    card.classList.add('expanded');
                }
            });
        });
    }
    
    renderHeroCards();
    renderDetailCards();
    setupSearch();
