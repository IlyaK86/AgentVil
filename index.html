        .hero-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; max-width: 1200px; margin: 0 auto 24px; }

        .director-card.expanded .arrow { transform: rotate(180deg); }
        
        .director-content { display: none; padding: 0 20px 20px; }
        .director-card.expanded .director-content { display: block; }
        
        .status-group { margin-bottom: 16px; }
        .status-group h4 { font-size: 13px; color: #666; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 2px solid; display: flex; justify-content: space-between; align-items: center; }

        .status-completed h4 { border-color: #34a853; color: #34a853; }
        .status-inwork h4 { border-color: #fbbc04; color: #fbbc04; }
        .status-pending h4 { border-color: #ea4335; color: #ea4335; }
        
        .task-list { list-style: none; }
        .task-item { padding: 10px 12px; margin-bottom: 6px; background: #fafafa; border-radius: 6px; display: flex; flex-direction: column; gap: 6px; cursor: pointer; transition: background 0.2s; }

        .task-item .task-main { display: flex; align-items: flex-start; gap: 10px; }
        .task-item .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
        .task-item.completed .status-dot { background: #34a853; }
        .task-item.inwork .status-dot { background: #fbbc04; }
        .task-item.pending .status-dot { background: #ea4335; }
        .task-item .task-title { font-size: 13px; color: #333; flex: 1; word-break: break-word; font-weight: 500; }
        .task-item .task-id { font-size: 11px; color: #999; flex-shrink: 0; }
        .task-item .task-summary { font-size: 12px; color: #666; padding-left: 18px; line-height: 1.4; }
        .task-item .task-summary:empty { display: none; }
        
        .hidden { display: none !important; }

        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { background: #fff; border-radius: 12px; max-width: 600px; width: 90%; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; transform: scale(0.9); transition: transform 0.2s; }

    function getStatusClass(status) {
        if (status === "5" || status === "6") return "completed";
        if (status === "3") return "inwork";
        return "pending";
    }
    
    function getSummary(description) {
        if (!description) return '';
        const firstSentence = description.split(/[.\n]/)[0].trim();
        return firstSentence.length > 100 ? firstSentence.substring(0, 100) + '...' : firstSentence;
    }
    
    function formatDeadline(deadline) {
        if (!deadline) return '';
        const date = new Date(deadline);
        return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    
    function formatDescription(description) {
        if (!description) return 'Нет описания';
        return description
            .replace(/\[url\](.*?)\[\/url\]/g, '<a href="$1" target="_blank">$1</a>')
            .replace(/\[url=([^\]]+)\](.*?)\[\/url\]/g, '<a href="$1" target="_blank">$2</a>')
            .replace(/\[user=(\d+)\](.*?)\[\/user\]/g, '<strong>$2</strong>')
            .replace(/\[b\](.*?)\[\/b\]/g, '<strong>$1</strong>')
            .replace(/\[u\](.*?)\[\/u\]/g, '<u>$1</u>')
            .replace(/\n/g, '<br>');
    }
    
    function showTaskModal(task) {
        const overlay = document.getElementById('modalOverlay');
        document.getElementById('modalTitle').textContent = task.title;
        document.getElementById('modalId').textContent = '#' + task.id;
        document.getElementById('modalBody').innerHTML = formatDescription(task.description);
        
        let footerText = '';
        if (task.deadline) {
            footerText += 'Срок: ' + formatDeadline(task.deadline) + ' | ';
        }
        footerText += 'Статус: ' + (statusLabels[task.status] || task.status);
        document.getElementById('modalFooter').textContent = footerText;
        
        overlay.classList.add('active');
    }
    
    function closeModal(e) {
        if (!e || e.target === document.getElementById('modalOverlay') || e.target.classList.contains('modal-close')) {
            document.getElementById('modalOverlay').classList.remove('active');
        }
    }
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
    });
    
    function countByStatus(tasks, status) {
        return tasks.filter(t => t.status === status).length;
    }
    
    function renderHeroCards() {
        const grid = document.getElementById('heroGrid');
        grid.innerHTML = '';
        
        Object.keys(rawData).forEach(id => {
            const d = rawData[id];
            const card = document.createElement('div');
            card.className = 'hero-card';
            card.onclick = () => scrollToDirector(id);
            card.innerHTML = `
                <div class="name">${d.name}</div>
                <div class="dept">${d.tasks.length} задач</div>
                <div class="count">${d.tasks.length}</div>
                <div class="count-label">задач</div>
            `;
            grid.appendChild(card);
        });
    }
    
    function scrollToDirector(id) {
        const el = document.getElementById('director-' + id);
        if (el) {
            el.scrollIntoView({ behavior: 'smooth' });
            el.classList.add('expanded');
        }
    }
    
    function renderDetailCards() {
        const section = document.getElementById('detailSection');
        section.innerHTML = '';
        
        Object.keys(rawData).forEach(id => {
            const d = rawData[id];
            const tasks = d.tasks;
            
            const completed = tasks.filter(t => t.status === "5" || t.status === "6");
            const inwork = tasks.filter(t => t.status === "3");
            const pending = tasks.filter(t => t.status === "2");
            
            const card = document.createElement('div');
            card.className = 'director-card';
            card.id = 'director-' + id;
            
            let tasksHtml = '';
            
            if (completed.length) {
                tasksHtml += `
                    <div class="status-group status-completed">
                        <h4>Завершённые <span class="count">${completed.length}</span></h4>
                        <ul class="task-list">
                            ${completed.map(t => `
                                <li class="task-item completed" data-search="${(t.title + ' ' + (t.description || '')).toLowerCase()}" onclick="showTaskModal(tasks.find(x => x.id === '${t.id}'))">
                                    <div class="task-main">
                                        <span class="status-dot"></span>
                                        <span class="task-title">${t.title}</span>
                                        <span class="task-id">#${t.id}</span>
                                    </div>
                                    <span class="task-summary">${getSummary(t.description)}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }
            
            if (inwork.length) {
                tasksHtml += `
                    <div class="status-group status-inwork">
                        <h4>В работе <span class="count">${inwork.length}</span></h4>
                        <ul class="task-list">
                            ${inwork.map(t => `
                                <li class="task-item inwork" data-search="${(t.title + ' ' + (t.description || '')).toLowerCase()}" onclick="showTaskModal(tasks.find(x => x.id === '${t.id}'))">
                                    <div class="task-main">
                                        <span class="status-dot"></span>
                                        <span class="task-title">${t.title}</span>
                                        <span class="task-id">#${t.id}</span>
                                    </div>
                                    <span class="task-summary">${getSummary(t.description)}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }
            
            if (pending.length) {
                tasksHtml += `
                    <div class="status-group status-pending">
                        <h4>Ожидающие <span class="count">${pending.length}</span></h4>
                        <ul class="task-list">
                            ${pending.map(t => `
                                <li class="task-item pending" data-search="${(t.title + ' ' + (t.description || '')).toLowerCase()}" onclick="showTaskModal(tasks.find(x => x.id === '${t.id}'))">
                                    <div class="task-main">
                                        <span class="status-dot"></span>
                                        <span class="task-title">${t.title}</span>
                                        <span class="task-id">#${t.id}</span>
                                    </div>
                                    <span class="task-summary">${getSummary(t.description)}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }
            
            card.innerHTML = `
                <div class="director-header" onclick="toggleCard(this)">
                    <div class="title">
                        <h3>${d.name}</h3>
                        <span class="badge">${tasks.length} задач</span>
                    </div>
                    <span class="arrow">▼</span>
                </div>
                <div class="director-content">
                    ${tasksHtml}
                </div>
            `;
            
            section.appendChild(card);
        });
    }
    
    function toggleCard(header) {
        const card = header.closest('.director-card');
        card.classList.toggle('expanded');
    }
    
    function setupSearch() {
        const input = document.getElementById('searchInput');
        input.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.director-card').forEach(card => {
                const items = card.querySelectorAll('.task-item');
                let hasMatch = false;
                items.forEach(item => {
                    const text = item.getAttribute('data-search');
                    if (query && text.includes(query)) {
                        item.classList.remove('hidden');
                        hasMatch = true;
                    } else {
                        item.classList.add('hidden');
                    }
                });
                if (query) {
                    card.classList.add('expanded');
                }
            });
        });
    }
    
    renderHeroCards();
    renderDetailCards();
    setupSearch();
    </script>
</body>
</html>
