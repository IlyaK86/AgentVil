<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vilavi Task Intelligence - Анализ нагрузки директоров</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f1419;
            --bg-card: #1a2332;
            --bg-card-hover: #243447;
            --text-primary: #e7e9ea;
            --text-secondary: #8b98a5;
            --accent-blue: #1d9bf0;
            --accent-green: #00ba7c;
            --accent-yellow: #ffd400;
            --accent-red: #f4212e;
            --border-color: #2f3f50;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: linear-gradient(135deg, #1a2332 0%, #0f1419 100%);
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }
        
        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--accent-blue), #00ba7c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header h1 i {
            -webkit-text-fill-color: var(--accent-blue);
            margin-right: 12px;
        }
        
        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .kpi-card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }
        
        .kpi-card i {
            font-size: 1.8rem;
            margin-bottom: 12px;
        }
        
        .kpi-card:nth-child(1) i { color: var(--accent-blue); }
        .kpi-card:nth-child(2) i { color: var(--accent-yellow); }
        .kpi-card:nth-child(3) i { color: var(--accent-green); }
        .kpi-card:nth-child(4) i { color: #a78bfa; }
        
        .kpi-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        
        .kpi-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .search-row {
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .search-input {
            flex: 1;
            min-width: 280px;
            padding: 14px 18px;
            padding-left: 46px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(29, 155, 240, 0.15);
        }
        
        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 280px;
        }
        
        .search-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
        
        .filter-select {
            padding: 14px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
            min-width: 160px;
        }
        
        .filter-select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        
        .directors-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .director-card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .director-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }
        
        .director-card.expanded {
            grid-column: 1 / -1;
            background: var(--bg-card-hover);
        }
        
        .director-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.3rem;
            color: #fff;
            flex-shrink: 0;
        }
        
        .director-info h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        
        .director-role {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .workload-badge {
            background: linear-gradient(135deg, var(--accent-blue), #00ba7c);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-left: auto;
        }
        
        .task-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .stat-item {
            flex: 1;
            padding: 14px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
        }
        
        .stat-bar {
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .stat-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .stat-bar-fill.executor { background: linear-gradient(90deg, var(--accent-blue), #60a5f4); }
        .stat-bar-fill.creator { background: linear-gradient(90deg, #a78bfa, #c4b5fd); }
        
        .expand-hint {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .task-list {
            display: none;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }
        
        .director-card.expanded .task-list {
            display: block;
        }
        
        .director-card.expanded .expand-hint i {
            transform: rotate(180deg);
        }
        
        .task-group {
            margin-bottom: 28px;
        }
        
        .task-group:last-child {
            margin-bottom: 0;
        }
        
        .task-group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
        }
        
        .task-group-header.completed {
            border-color: var(--accent-green);
        }
        
        .task-group-header.in-progress {
            border-color: var(--accent-blue);
        }
        
        .task-group-header.pending {
            border-color: var(--accent-yellow);
        }
        
        .task-group-header i {
            font-size: 1.2rem;
        }
        
        .task-group-header.completed i { color: var(--accent-green); }
        .task-group-header.in-progress i { color: var(--accent-blue); }
        .task-group-header.pending i { color: var(--accent-yellow); }
        
        .task-group-title {
            font-size: 1rem;
            font-weight: 600;
        }
        
        .task-group-count {
            margin-left: auto;
            background: var(--border-color);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .task-items {
            display: grid;
            gap: 10px;
        }
        
        .task-item {
            background: rgba(0,0,0,0.25);
            padding: 14px 18px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: background 0.2s;
        }
        
        .task-item:hover {
            background: rgba(0,0,0,0.35);
        }
        
        .task-id {
            font-family: 'Consolas', monospace;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 50px;
        }
        
        .task-title {
            flex: 1;
            font-size: 0.95rem;
        }
        
        .task-role {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
        }
        
        .task-role.executor {
            background: rgba(29, 155, 240, 0.2);
            color: var(--accent-blue);
        }
        
        .task-role.creator {
            background: rgba(167, 139, 250, 0.2);
            color: #a78bfa;
        }
        
        .task-deadline {
            color: var(--text-secondary);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .task-deadline.overdue {
            color: var(--accent-red);
        }
        
        .empty-tasks {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .empty-tasks i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        @media (max-width: 1200px) {
            .directors-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .kpi-row {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .directors-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.6rem;
            }
            
            .task-item {
                flex-wrap: wrap;
            }
            
            .task-deadline {
                width: 100%;
                margin-top: 8px;
                padding-left: 64px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-chart-pie"></i> Vilavi Task Intelligence - Анализ нагрузки директоров</h1>
        <p>Полная визуализация рабочей нагрузки директоров компании</p>
    </div>
    
    <div class="kpi-row">
        <div class="kpi-card">
            <i class="fas fa-users"></i>
            <div class="kpi-value" id="totalDirectors">-</div>
            <div class="kpi-label">Директоров</div>
        </div>
        <div class="kpi-card">
            <i class="fas fa-tasks"></i>
            <div class="kpi-value" id="totalTasks">-</div>
            <div class="kpi-label">Всего задач</div>
        </div>
        <div class="kpi-card">
            <i class="fas fa-check-circle"></i>
            <div class="kpi-value" id="completedTasks">-</div>
            <div class="kpi-label">Выполнено</div>
        </div>
        <div class="kpi-card">
            <i class="fas fa-spinner"></i>
            <div class="kpi-value" id="inProgressTasks">-</div>
            <div class="kpi-label">В работе</div>
        </div>
    </div>
    
    <div class="search-row">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск по задачам...">
        </div>
        <select class="filter-select" id="statusFilter">
            <option value="all">Все статусы</option>
            <option value="completed">Выполнено</option>
            <option value="inProgress">В работе</option>
            <option value="pending">В ожидании</option>
        </select>
        <select class="filter-select" id="directorFilter">
            <option value="all">Все директоры</option>
        </select>
    </div>
    
    <div class="directors-grid" id="directorsGrid"></div>
    
    <script>
        const directorNames = {
            "1": { name: "Евгений Древс", role: "Директор IT", color: "#3b82f6" },
            "18": { name: "Денис Крицкий", role: "Коммерческий директор", color: "#f59e0b" },
            "26": { name: "Вячеслав Мельников", role: "Директор по правовым вопросам", color: "#10b981" },
            "12": { name: "Анастасия Колчина", role: "Директор по клиентскому сервису", color: "#ec4899" },
            "30": { name: "Инна Мирная", role: "Директор по персоналу HR", color: "#8b5cf6" },
            "16": { name: "Сергей Пронин", role: "Операционный директор, Логистика", color: "#06b6d4" },
            "427": { name: "Илья Картунов", role: "Директор", color: "#6366f1" }
        };
        
        const avatarColors = {
            "1": "linear-gradient(135deg, #3b82f6, #1d4ed8)",
            "18": "linear-gradient(135deg, #f59e0b, #d97706)",
            "26": "linear-gradient(135deg, #10b981, #059669)",
            "12": "linear-gradient(135deg, #ec4899, #db2777)",
            "30": "linear-gradient(135deg, #8b5cf6, #7c3aed)",
            "16": "linear-gradient(135deg, #06b6d4, #0891b2)",
            "427": "linear-gradient(135deg, #6366f1, #4f46e5)"
        };
        
        let expandedCard = null;
        let currentData = null;
        
        function getInitials(name) {
            const parts = name.split(' ');
            if (parts.length >= 2) {
                return parts[0][0] + parts[1][0];
            }
            return name.substring(0, 2);
        }
        
        function formatDeadline(dateStr) {
            if (!dateStr) return '<span class="task-deadline"><i class="fas fa-minus"></i> Без срока</span>';
            const date = new Date(dateStr);
            const now = new Date();
            const isOverdue = date < now;
            const formatted = date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
            return `<span class="task-deadline ${isOverdue ? 'overdue' : ''}"><i class="fas fa-calendar"></i> ${formatted}</span>`;
        }
        
        function getTaskGroups(tasks, searchTerm = '', statusFilter = 'all') {
            const filtered = tasks.filter(task => {
                const matchesSearch = !searchTerm || 
                    task.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    task.id.includes(searchTerm);
                
                let matchesStatus = true;
                if (statusFilter === 'completed') {
                    matchesStatus = task.status === '5' || task.status === '6';
                } else if (statusFilter === 'inProgress') {
                    matchesStatus = task.status === '3' || task.status === '4';
                } else if (statusFilter === 'pending') {
                    matchesStatus = task.status === '1' || task.status === '2';
                }
                
                return matchesSearch && matchesStatus;
            });
            
            const completed = filtered.filter(t => t.status === '5' || t.status === '6');
            const inProgress = filtered.filter(t => t.status === '3' || t.status === '4');
            const pending = filtered.filter(t => t.status === '1' || t.status === '2');
            
            return { completed, inProgress, pending, total: filtered.length };
        }
        
        function renderTaskGroup(title, icon, tasks, className, searchTerm, statusFilter) {
            if (tasks.length === 0) return '';
            
            const { completed, inProgress, pending } = getTaskGroups(tasks, searchTerm, statusFilter);
            
            let filteredTasks = tasks;
            if (searchTerm || statusFilter !== 'all') {
                filteredTasks = tasks.filter(task => {
                    const matchesSearch = !searchTerm || 
                        task.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        task.id.includes(searchTerm);
                    
                    let matchesStatus = true;
                    if (statusFilter === 'completed') {
                        matchesStatus = task.status === '5' || task.status === '6';
                    } else if (statusFilter === 'inProgress') {
                        matchesStatus = task.status === '3' || task.status === '4';
                    } else if (statusFilter === 'pending') {
                        matchesStatus = task.status === '1' || task.status === '2';
                    }
                    
                    return matchesSearch && matchesStatus;
                });
            }
            
            if (filteredTasks.length === 0) return '';
            
            const iconClass = className === 'completed' ? 'fa-check-circle' : className === 'in-progress' ? 'fa-spinner' : 'fa-clock';
            const statusCount = filteredTasks.length;
            
            let tasksHtml = filteredTasks.map(task => `
                <div class="task-item">
                    <span class="task-id">#${task.id}</span>
                    <span class="task-title">${task.title}</span>
                    <span class="task-role ${task.isExecutor ? 'executor' : 'creator'}">
                        <i class="fas ${task.isExecutor ? 'fa-hand-pointer' : 'fa-plus'}"></i>
                        ${task.isExecutor ? 'Исполнитель' : 'Создатель'}
                    </span>
                    ${formatDeadline(task.deadline)}
                </div>
            `).join('');
            
            return `
                <div class="task-group">
                    <div class="task-group-header ${className}">
                        <i class="fas ${iconClass}"></i>
                        <span class="task-group-title">${title}</span>
                        <span class="task-group-count">${statusCount}</span>
                    </div>
                    <div class="task-items">
                        ${tasksHtml}
                    </div>
                </div>
            `;
        }
        
        function renderDirectorCard(directorId, director) {
            const info = directorNames[directorId] || { name: director.name, role: director.role || 'Director', color: '#6b7280' };
            const maxWorkload = 35;
            const executorPercent = Math.min((director.asExecutor.total / maxWorkload) * 100, 100);
            const creatorPercent = Math.min((director.asCreator.total / maxWorkload) * 100, 100);
            const initials = getInitials(info.name);
            const bgColor = avatarColors[directorId] || 'linear-gradient(135deg, #6b7280, #4b5563)';
            
            const searchTerm = document.getElementById('searchInput').value;
            const statusFilter = document.getElementById('statusFilter').value;
            
            const { completed, inProgress, pending, total } = getTaskGroups(director.tasks, searchTerm, statusFilter);
            
            const taskListHtml = director.tasks.length > 0 ? 
                renderTaskGroup('Выполнено', 'check', director.tasks, 'completed', searchTerm, statusFilter) +
                renderTaskGroup('В работе', 'spinner', director.tasks, 'in-progress', searchTerm, statusFilter) +
                renderTaskGroup('В ожидании', 'clock', director.tasks, 'pending', searchTerm, statusFilter) :
                `<div class="empty-tasks">
                    <i class="fas fa-clipboard-check"></i>
                    <div>Нет задач</div>
                </div>`;
            
            return `
                <div class="director-card" data-director="${directorId}" onclick="toggleCard(this)">
                    <div class="director-header">
                        <div class="avatar" style="background: ${bgColor}">${initials}</div>
                        <div class="director-info">
                            <h3>${info.name}</h3>
                            <div class="director-role">${info.role}</div>
                        </div>
                        <div class="workload-badge">${director.totalWorkload} задач</div>
                    </div>
                    
                    <div class="task-stats">
                        <div class="stat-item">
                            <div class="stat-label"><i class="fas fa-hand-pointer"></i> Как исполнитель</div>
                            <div class="stat-value">${director.asExecutor.total}</div>
                            <div class="stat-bar">
                                <div class="stat-bar-fill executor" style="width: ${executorPercent}%"></div>
                            </div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label"><i class="fas fa-plus"></i> Как создатель</div>
                            <div class="stat-value">${director.asCreator.total}</div>
                            <div class="stat-bar">
                                <div class="stat-bar-fill creator" style="width: ${creatorPercent}%"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="expand-hint">
                        <i class="fas fa-chevron-down"></i> Нажмите для деталей
                    </div>
                    
                    <div class="task-list">
                        ${taskListHtml}
                    </div>
                </div>
            `;
        }
        
        function toggleCard(card) {
            const directorId = card.dataset.director;
            
            if (expandedCard === directorId) {
                card.classList.remove('expanded');
                expandedCard = null;
            } else {
                document.querySelectorAll('.director-card').forEach(c => c.classList.remove('expanded'));
                card.classList.add('expanded');
                expandedCard = directorId;
                
                setTimeout(() => {
                    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            }
        }
        
        function calculateKPIs(data) {
            let totalDirectors = Object.keys(data.directors).length;
            let totalTasks = 0;
            let completedTasks = 0;
            let inProgressTasks = 0;
            
            Object.values(data.directors).forEach(director => {
                director.tasks.forEach(task => {
                    totalTasks++;
                    if (task.status === '5' || task.status === '6') completedTasks++;
                    if (task.status === '3' || task.status === '4') inProgressTasks++;
                });
            });
            
            return { totalDirectors, totalTasks, completedTasks, inProgressTasks };
        }
        
        function populateDirectorFilter(data) {
            const select = document.getElementById('directorFilter');
            Object.entries(data.directors).forEach(([id, director]) => {
                const info = directorNames[id] || { name: director.name };
                select.innerHTML += `<option value="${id}">${info.name}</option>`;
            });
        }
        
        function renderDashboard(data) {
            currentData = data;
            const kpis = calculateKPIs(data);
            
            document.getElementById('totalDirectors').textContent = kpis.totalDirectors;
            document.getElementById('totalTasks').textContent = kpis.totalTasks;
            document.getElementById('completedTasks').textContent = kpis.completedTasks;
            document.getElementById('inProgressTasks').textContent = kpis.inProgressTasks;
            
            populateDirectorFilter(data);
            
            const grid = document.getElementById('directorsGrid');
            grid.innerHTML = Object.entries(data.directors)
                .sort((a, b) => b[1].totalWorkload - a[1].totalWorkload)
                .map(([id, director]) => renderDirectorCard(id, director))
                .join('');
        }
        
        document.getElementById('searchInput').addEventListener('input', () => {
            if (currentData) renderDashboard(currentData);
        });
        
        document.getElementById('statusFilter').addEventListener('change', () => {
            if (currentData) renderDashboard(currentData);
        });
        
        document.getElementById('directorFilter').addEventListener('change', (e) => {
            const selectedId = e.target.value;
            if (selectedId === 'all') {
                if (currentData) renderDashboard(currentData);
            } else {
